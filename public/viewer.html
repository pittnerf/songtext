<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song Lyrics Viewer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page viewer-page">
    <header class="page-header">
      <h1>Most ezt énekeljük</h1>
      <p id="status-text">Connecting…</p>
    </header>

    <main class="page-main">
      <div class="status-bar" aria-live="polite">
        <span class="status-dot" id="status-dot"></span>
        <span id="sync-status">Waiting for the current song</span>
      </div>

      <div id="song-content" class="viewer-empty">
        <p>Waiting for the operator to select a song…</p>
      </div>
    </main>

    <script src="js/config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/songs.js"></script>
    <script src="js/viewer.js"></script>
  </body>
</html>
